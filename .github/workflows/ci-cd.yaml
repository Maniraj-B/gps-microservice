name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t gps-service .

    - name: Run container
      run: docker run -d -p 5000:5000 gps-service